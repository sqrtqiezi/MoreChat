name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Run local-equivalent lint gate
        run: pnpm lint

      - name: Build project
        run: pnpm build

      - name: Generate Prisma Client
        run: cd apps/server && pnpm prisma generate

      - name: Create deployment package
        run: |
          mkdir -p deploy-package
          cp -r apps/server/dist deploy-package/
          cp -r apps/server/scripts deploy-package/server-scripts
          cp -r apps/web/dist deploy-package/web-dist
          cp -r apps/server/prisma deploy-package/
          cp package.json pnpm-lock.yaml pnpm-workspace.yaml deploy-package/
          cp -r apps/server/package.json deploy-package/server-package.json
          cp -r apps/web/package.json deploy-package/web-package.json
          cp ecosystem.config.cjs deploy-package/
          cp deploy/init-env.sh deploy-package/
          tar czf deploy.tar.gz -C deploy-package .

      - name: Check VPS firewall for port 8079
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            echo "🔍 Checking firewall status..."
            if sudo firewall-cmd --list-ports | grep -q 8079; then
              echo "✅ Port 8079 is already open"
            else
              echo "⚠️ Port 8079 not open, adding..."
              sudo firewall-cmd --permanent --add-port=8079/tcp
              sudo firewall-cmd --reload
              echo "✅ Port 8079 opened"
            fi

      - name: Upload deployment package
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "deploy.tar.gz"
          target: "/tmp/"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: DATABASE_URL,DATA_LAKE_TYPE,DATA_LAKE_PATH,PORT,NODE_ENV,CORS_ORIGIN,JUHEXBOT_API_URL,JUHEXBOT_APP_KEY,JUHEXBOT_APP_SECRET,JUHEXBOT_CLIENT_GUID,JUHEXBOT_CLOUD_API_URL,WEBHOOK_URL,LOG_LEVEL,AUTH_PASSWORD_HASH,AUTH_JWT_SECRET,ALICLOUD_OSS_REGION,ALICLOUD_OSS_BUCKET,ALICLOUD_OSS_ACCESS_KEY_ID,ALICLOUD_OSS_ACCESS_KEY_SECRET,ALICLOUD_OSS_ENDPOINT
          script: |
            set -e

            # 创建部署目录
            mkdir -p /opt/morechat/apps/server /opt/morechat/apps/web

            # 解压部署包
            echo "📦 Extracting deployment package..."
            cd /opt/morechat
            tar xzf /tmp/deploy.tar.gz
            rm /tmp/deploy.tar.gz

            # 恢复 package.json 和目录结构
            mv server-package.json apps/server/package.json
            mv web-package.json apps/web/package.json
            rm -rf apps/web/dist
            mv web-dist apps/web/dist
            rm -rf apps/server/prisma
            mv prisma apps/server/prisma
            rm -rf apps/server/dist
            mv dist apps/server/dist
            rm -rf apps/server/scripts
            mv server-scripts apps/server/scripts

            # 生成 .env 文件
            echo "⚙️ Configuring environment..."
            export DATABASE_URL="${DATABASE_URL}"
            export DATA_LAKE_TYPE="${DATA_LAKE_TYPE}"
            export DATA_LAKE_PATH="${DATA_LAKE_PATH}"
            export PORT="${PORT}"
            export NODE_ENV="${NODE_ENV}"
            export CORS_ORIGIN="${CORS_ORIGIN}"
            export JUHEXBOT_API_URL="${JUHEXBOT_API_URL}"
            export JUHEXBOT_APP_KEY="${JUHEXBOT_APP_KEY}"
            export JUHEXBOT_APP_SECRET="${JUHEXBOT_APP_SECRET}"
            export JUHEXBOT_CLIENT_GUID="${JUHEXBOT_CLIENT_GUID}"
            export WEBHOOK_URL="${WEBHOOK_URL}"
            export LOG_LEVEL="${LOG_LEVEL}"
            export AUTH_PASSWORD_HASH="${AUTH_PASSWORD_HASH}"
            export AUTH_JWT_SECRET="${AUTH_JWT_SECRET}"
            export JUHEXBOT_CLOUD_API_URL="${JUHEXBOT_CLOUD_API_URL}"
            export ALICLOUD_OSS_REGION="${ALICLOUD_OSS_REGION}"
            export ALICLOUD_OSS_BUCKET="${ALICLOUD_OSS_BUCKET}"
            export ALICLOUD_OSS_ACCESS_KEY_ID="${ALICLOUD_OSS_ACCESS_KEY_ID}"
            export ALICLOUD_OSS_ACCESS_KEY_SECRET="${ALICLOUD_OSS_ACCESS_KEY_SECRET}"
            export ALICLOUD_OSS_ENDPOINT="${ALICLOUD_OSS_ENDPOINT}"
            bash init-env.sh

            # 安装生产依赖
            echo "📦 Installing production dependencies..."
            if ! command -v g++ >/dev/null 2>&1; then
              echo "🛠️ Installing native build tools..."
              if command -v dnf >/dev/null 2>&1; then
                sudo dnf install -y gcc-c++ make
              elif command -v yum >/dev/null 2>&1; then
                sudo yum install -y gcc-c++ make
              elif command -v apt-get >/dev/null 2>&1; then
                sudo apt-get update
                sudo apt-get install -y g++ make
              else
                echo "❌ Unsupported package manager; g++ is required for native dependencies"
                exit 1
              fi
            fi
            export ONNXRUNTIME_NODE_INSTALL="skip"
            pnpm install --prod --frozen-lockfile

            # 生成 Prisma Client
            echo "🗄️ Generating Prisma Client..."
            cd apps/server
            npx prisma generate

            # 数据库迁移
            echo "🗄️ Running database migration..."
            migrate_output="$(npx prisma migrate deploy 2>&1)" || migrate_status=$?
            echo "$migrate_output"
            if [ "${migrate_status:-0}" -ne 0 ]; then
              if printf '%s' "$migrate_output" | grep -q '20260424000000_add_knowledge_models'; then
                if printf '%s' "$migrate_output" | grep -q 'duplicate column name: lastSyncAt' \
                  || printf '%s' "$migrate_output" | grep -q 'Error: P3009'; then
                  echo "⚠️ Detected partially applied knowledge migration, reconciling Prisma state..."
                  npx prisma migrate resolve --rolled-back 20260424000000_add_knowledge_models || true
                  npx prisma db execute --schema prisma/schema.prisma --stdin <<'SQL'
                  CREATE TABLE IF NOT EXISTS "file_cache" (
                      "msg_id" TEXT NOT NULL PRIMARY KEY,
                      "file_name" TEXT NOT NULL,
                      "file_ext" TEXT NOT NULL,
                      "file_size" INTEGER NOT NULL,
                      "aes_key" TEXT NOT NULL,
                      "cdn_file_id" TEXT NOT NULL,
                      "md5" TEXT,
                      "oss_url" TEXT,
                      "status" TEXT NOT NULL DEFAULT 'pending',
                      "error_message" TEXT,
                      "created_at" DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP,
                      "downloaded_at" DATETIME
                  );
                  CREATE TABLE IF NOT EXISTS "MessageTag" (
                      "id" TEXT NOT NULL PRIMARY KEY,
                      "msgId" TEXT NOT NULL,
                      "tag" TEXT NOT NULL,
                      "source" TEXT NOT NULL,
                      "createdAt" DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP
                  );
                  CREATE TABLE IF NOT EXISTS "MessageEntity" (
                      "id" TEXT NOT NULL PRIMARY KEY,
                      "msgId" TEXT NOT NULL,
                      "type" TEXT NOT NULL,
                      "value" TEXT NOT NULL,
                      "createdAt" DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP
                  );
                  CREATE TABLE IF NOT EXISTS "DigestEntry" (
                      "id" TEXT NOT NULL PRIMARY KEY,
                      "conversationId" TEXT NOT NULL,
                      "startTime" INTEGER NOT NULL,
                      "endTime" INTEGER NOT NULL,
                      "summary" TEXT NOT NULL,
                      "messageCount" INTEGER NOT NULL,
                      "createdAt" DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP
                  );
                  CREATE TABLE IF NOT EXISTS "Topic" (
                      "id" TEXT NOT NULL PRIMARY KEY,
                      "title" TEXT NOT NULL,
                      "description" TEXT,
                      "messageCount" INTEGER NOT NULL DEFAULT 0,
                      "firstSeenAt" INTEGER NOT NULL,
                      "lastSeenAt" INTEGER NOT NULL,
                      "createdAt" DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP,
                      "updatedAt" DATETIME NOT NULL
                  );
                  CREATE TABLE IF NOT EXISTS "TopicMessage" (
                      "id" TEXT NOT NULL PRIMARY KEY,
                      "topicId" TEXT NOT NULL,
                      "msgId" TEXT NOT NULL,
                      CONSTRAINT "TopicMessage_topicId_fkey" FOREIGN KEY ("topicId") REFERENCES "Topic" ("id") ON DELETE CASCADE ON UPDATE CASCADE
                  );
                  CREATE TABLE IF NOT EXISTS "ImportanceRule" (
                      "id" TEXT NOT NULL PRIMARY KEY,
                      "type" TEXT NOT NULL,
                      "value" TEXT NOT NULL,
                      "priority" INTEGER NOT NULL DEFAULT 0,
                      "isActive" BOOLEAN NOT NULL DEFAULT true,
                      "createdAt" DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP,
                      "updatedAt" DATETIME NOT NULL
                  );
                  CREATE INDEX IF NOT EXISTS "file_cache_status_idx" ON "file_cache"("status");
                  CREATE INDEX IF NOT EXISTS "MessageTag_msgId_idx" ON "MessageTag"("msgId");
                  CREATE INDEX IF NOT EXISTS "MessageTag_tag_idx" ON "MessageTag"("tag");
                  CREATE UNIQUE INDEX IF NOT EXISTS "MessageTag_msgId_tag_source_key" ON "MessageTag"("msgId", "tag", "source");
                  CREATE INDEX IF NOT EXISTS "MessageEntity_msgId_idx" ON "MessageEntity"("msgId");
                  CREATE INDEX IF NOT EXISTS "MessageEntity_type_idx" ON "MessageEntity"("type");
                  CREATE INDEX IF NOT EXISTS "MessageEntity_value_idx" ON "MessageEntity"("value");
                  CREATE INDEX IF NOT EXISTS "DigestEntry_conversationId_idx" ON "DigestEntry"("conversationId");
                  CREATE INDEX IF NOT EXISTS "DigestEntry_startTime_idx" ON "DigestEntry"("startTime");
                  CREATE INDEX IF NOT EXISTS "Topic_lastSeenAt_idx" ON "Topic"("lastSeenAt");
                  CREATE INDEX IF NOT EXISTS "TopicMessage_topicId_idx" ON "TopicMessage"("topicId");
                  CREATE INDEX IF NOT EXISTS "TopicMessage_msgId_idx" ON "TopicMessage"("msgId");
                  CREATE UNIQUE INDEX IF NOT EXISTS "TopicMessage_topicId_msgId_key" ON "TopicMessage"("topicId", "msgId");
                  CREATE INDEX IF NOT EXISTS "ImportanceRule_type_isActive_idx" ON "ImportanceRule"("type", "isActive");
                  CREATE INDEX IF NOT EXISTS "MessageIndex_fromUsername_idx" ON "MessageIndex"("fromUsername");
                  CREATE INDEX IF NOT EXISTS "MessageIndex_toUsername_idx" ON "MessageIndex"("toUsername");
                  SQL
                  npx prisma migrate resolve --applied 20260424000000_add_knowledge_models
                  npx prisma migrate deploy
                else
                  exit "${migrate_status:-1}"
                fi
              else
                exit "${migrate_status:-1}"
              fi
            fi
            cd ../..

            # 重启服务
            echo "🔄 Restarting service..."
            if pm2 list | grep -q morechat; then
              pm2 restart morechat
            else
              pm2 start ecosystem.config.cjs
              pm2 save
            fi

            # 健康检查
            echo "🏥 Health check..."
            sleep 5
            if curl -sf http://localhost:3100/health; then
              echo "✅ Deployment successful!"
            else
              echo "⚠️ Health check failed"
              pm2 logs morechat --lines 20 --nostream
              exit 1
            fi
        env:
          DATABASE_URL: ${{ secrets.ENV_DATABASE_URL }}
          DATA_LAKE_TYPE: ${{ secrets.ENV_DATA_LAKE_TYPE }}
          DATA_LAKE_PATH: ${{ secrets.ENV_DATA_LAKE_PATH }}
          PORT: ${{ secrets.ENV_PORT }}
          NODE_ENV: ${{ secrets.ENV_NODE_ENV }}
          CORS_ORIGIN: ${{ secrets.ENV_CORS_ORIGIN }}
          JUHEXBOT_API_URL: ${{ secrets.ENV_JUHEXBOT_API_URL }}
          JUHEXBOT_APP_KEY: ${{ secrets.ENV_JUHEXBOT_APP_KEY }}
          JUHEXBOT_APP_SECRET: ${{ secrets.ENV_JUHEXBOT_APP_SECRET }}
          JUHEXBOT_CLIENT_GUID: ${{ secrets.ENV_JUHEXBOT_CLIENT_GUID }}
          WEBHOOK_URL: "http://${{ secrets.VPS_HOST }}:8079/webhook"
          LOG_LEVEL: "debug"
          AUTH_PASSWORD_HASH: ${{ secrets.ENV_AUTH_PASSWORD_HASH }}
          AUTH_JWT_SECRET: ${{ secrets.ENV_AUTH_JWT_SECRET }}
          JUHEXBOT_CLOUD_API_URL: ${{ secrets.ENV_JUHEXBOT_CLOUD_API_URL }}
          ALICLOUD_OSS_REGION: ${{ secrets.ENV_ALICLOUD_OSS_REGION }}
          ALICLOUD_OSS_BUCKET: ${{ secrets.ENV_ALICLOUD_OSS_BUCKET }}
          ALICLOUD_OSS_ACCESS_KEY_ID: ${{ secrets.ENV_ALICLOUD_OSS_ACCESS_KEY_ID }}
          ALICLOUD_OSS_ACCESS_KEY_SECRET: ${{ secrets.ENV_ALICLOUD_OSS_ACCESS_KEY_SECRET }}
          ALICLOUD_OSS_ENDPOINT: ${{ secrets.ENV_ALICLOUD_OSS_ENDPOINT }}
